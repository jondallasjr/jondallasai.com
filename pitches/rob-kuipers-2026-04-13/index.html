<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>For Rob Kuipers — Jon Dallas</title>
  <meta http-equiv="refresh" content="0; url=https://mkwawa-pitch-production.up.railway.app/">
  <link rel="canonical" href="https://mkwawa-pitch-production.up.railway.app/">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F7F5F1; color: #1A1917; min-height: 100vh; display: grid; place-items: center; padding: 2rem; }
    .card { max-width: 520px; text-align: center; }
    .dot { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #C17B3B; margin-bottom: 1rem; }
    .dot::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #C17B3B; animation: pulse 1.6s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    h1 { font-family: 'DM Serif Display', serif; font-size: 2.25rem; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 1rem; }
    p { color: #5A5752; line-height: 1.65; margin-bottom: 1.5rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; background: #C17B3B; color: white; text-decoration: none; padding: 0.85rem 1.5rem; border-radius: 8px; font-weight: 600; }
    .btn:hover { background: #a96730; }
    .small { font-size: 0.82rem; color: #8C8880; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot">Opening your pitch</div>
    <h1>For Rob Kuipers.</h1>
    <p>Redirecting to the full pitch — two working demos included.</p>
    <a class="btn" href="https://mkwawa-pitch-production.up.railway.app/">Open pitch →</a>
    <p class="small">If you're not redirected automatically, click above.</p>
  </div>
  <script>
    window.location.replace("https://mkwawa-pitch-production.up.railway.app/");
  </script>
</body>
</html>
